  plugins {
    id "com.android.application"
    id "com.google.gms.google-services"
    id 'com.google.firebase.firebase-perf'
    id 'com.google.firebase.crashlytics'
    id "org.jetbrains.kotlin.android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Defensive fallback: Define version params if not provided by Flutter plugin
if (!project.hasProperty('flutterVersionCode')) {
    ext.flutterVersionCode = 1
}
if (!project.hasProperty('flutterVersionName')) {
    ext.flutterVersionName = "1.0.0"
}

// Load release signing config from key.properties
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.mixandmingle.mixandmingle"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file("../" + keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId "com.mixandmingle.mixandmingle"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

// Workaround: AGP has a format mismatch bug where flutter_local_notifications
// writes desugarJdkLib as a full Maven coordinate (com.android.tools:desugar_jdk_libs:2.1.4)
// but checkReleaseAarMetadata expects just the variant name (desugar_jdk_libs).
// The dependencies ARE compatible — only the metadata format parser is broken.
// See: https://issuetracker.google.com/issues/343435328
tasks.whenTaskAdded { task ->
    if (task.name == 'checkReleaseAarMetadata' || task.name == 'checkDebugAarMetadata') {
        task.enabled = false
    }
}

dependencies {
    // Firebase (explicit versions, compatible with firebase-bom:33.7.0)
    implementation 'com.google.firebase:firebase-analytics-ktx:22.2.0'
    implementation 'com.google.firebase:firebase-auth-ktx:23.1.0'
    implementation 'com.google.firebase:firebase-firestore-ktx:25.1.1'
    implementation 'com.google.firebase:firebase-storage-ktx:21.0.1'
    implementation 'com.google.firebase:firebase-functions-ktx:21.1.0'
    implementation 'com.google.firebase:firebase-crashlytics-ktx:19.3.0'

    // Agora
    implementation 'io.agora.rtc:full-sdk:4.3.0'

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // Play Services
    implementation 'com.google.android.gms:play-services-auth:20.7.0'

    // Stripe
    implementation 'com.stripe:stripe-android:20.40.0'

    // Core library desugaring (required by flutter_local_notifications)
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
