// Plugin and Kotlin versions are managed in settings.gradle (new plugin DSL).
// Removing buildscript {} to avoid AGP version conflict with settings.gradle.

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}
