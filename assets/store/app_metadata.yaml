# Data Safety (Google Play)
data_safety:
  data_collection:
    - type: "Personal info"
      data: "Name, Email address"
      purpose: "Account creation and management"
      shared: false
      optional: false

    - type: "Financial info"
      data: "Purchase history"
      purpose: "In-app purchases"
      shared: true
      shared_with: "Payment processors (RevenueCat, Stripe)"
      optional: true

    - type: "Photos and videos"
      data: "Photos, Videos"
      purpose: "Profile photo, live video streaming"
      shared: false
      optional: true

    - type: "Audio"
      data: "Voice or sound recordings"
      purpose: "Live audio chat"
      shared: false
      optional: true

    - type: "App activity"
      data: "App interactions, In-app search history"
      purpose: "Analytics and app functionality"
      shared: true
      shared_with: "Firebase Analytics"
      optional: false

    - type: "App info and performance"
      data: "Crash logs, Diagnostics"
      purpose: "App stability and performance"
      shared: true
      shared_with: "Firebase Crashlytics"
      optional: false

    - type: "Device or other IDs"
      data: "Device ID"
      purpose: "Analytics and fraud prevention"
      shared: true
      shared_with: "Firebase"
      optional: false

  security_practices:
    data_encrypted_in_transit: true
    data_deletion_request: true
    deletion_instructions: "Request data deletion through app settings or email support@mixmingle.app"

