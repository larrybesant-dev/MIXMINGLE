# Mix & Mingle App Store Metadata
# Version: 1.0.0
# Last Updated: 2026-02-09

app_info:
  name: "Mix & Mingle"
  subtitle: "Live Video Chat Rooms"

# iOS App Store
ios:
  app_name: "Mix & Mingle"
  subtitle: "Live Video Chat Rooms"

  description: |
    Mix & Mingle is the ultimate live video chat platform where you can connect with people from around the world in real-time video rooms.

    🎥 MULTI-PARTICIPANT VIDEO CHAT
    Join rooms with up to 12 active video participants. Our adaptive grid layout ensures everyone is visible, whether you're in a 1-on-1 conversation or a group discussion.

    ⭐ SPOTLIGHT & FEATURE
    Stand out from the crowd! Use the spotlight feature to become the featured broadcaster, or watch as hosts highlight interesting participants.

    🎛️ HOST YOUR OWN ROOMS
    Create and manage your own video rooms. As a host, you have complete control with tools to mute participants, grant co-host privileges, and manage room settings.

    👑 VIP MEMBERSHIP
    Unlock exclusive features with VIP and VIP+ memberships:
    • Access VIP-only rooms
    • Enhanced spotlight duration
    • Priority room placement
    • Exclusive profile badges

    💰 VIRTUAL GIFTS & TIPS
    Show appreciation to your favorite broadcasters with virtual gifts. Our coin-based economy lets you support creators and stand out in rooms.

    🛡️ SAFE & MODERATED
    We take safety seriously. Our moderation system includes user blocking, reporting, and active monitoring to ensure a positive experience for everyone.

    Download Mix & Mingle today and start connecting!

  keywords:
    - video chat
    - live streaming
    - social video
    - video rooms
    - live video
    - group chat
    - video call
    - social network
    - live broadcast
    - video community

  promotional_text: "Connect with people worldwide in live video chat rooms. Join the Mix & Mingle community today!"

  support_url: "https://mixmingle.app/support"
  marketing_url: "https://mixmingle.app"
  privacy_url: "https://mixmingle.app/privacy"

  category:
    primary: "Social Networking"
    secondary: "Entertainment"

  age_rating:
    rating: "17+"
    content_descriptions:
      - "Unrestricted Web Access"
      - "Frequent/Intense Mature/Suggestive Themes"

  in_app_purchases:
    - name: "VIP Monthly"
      price: "$9.99"
      description: "Unlock VIP features for 1 month"
    - name: "VIP+ Monthly"
      price: "$19.99"
      description: "Unlock VIP+ features for 1 month"
    - name: "Coin Pack - Small"
      price: "$4.99"
      description: "500 coins for virtual gifts"
    - name: "Coin Pack - Medium"
      price: "$9.99"
      description: "1,200 coins for virtual gifts"
    - name: "Coin Pack - Large"
      price: "$19.99"
      description: "2,800 coins for virtual gifts"

