<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#141030"/>
      <stop offset="100%" stop-color="#060512"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="35%"  stop-color="#D8C4FF"/>
      <stop offset="70%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="50%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="11" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.7" result="fc"/>
      <feComposite in="fc" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <!-- Inner circle -->
  <circle cx="512" cy="512" r="490" fill="#0C0A28"/>

  <!-- Ambient halo -->
  <ellipse cx="512" cy="512" rx="430" ry="272"
           fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.20"
           filter="url(#glow)"/>

  <!-- Main ring -->
  <ellipse cx="512" cy="512" rx="412" ry="258"
           fill="none" stroke="url(#ringGrad)" stroke-width="11"
           filter="url(#glow)"/>

  <!-- Specular highlight -->
  <ellipse cx="512" cy="512" rx="407" ry="253"
           fill="none" stroke="rgba(220,182,255,0.26)" stroke-width="2"/>

  <!-- MIXVY text -->
  <text x="512" y="570"
        font-family="'Arial Black', 'Impact', 'Arial', system-ui, sans-serif"
        font-size="178" font-weight="900"
        text-anchor="middle"
        letter-spacing="10"
        fill="url(#textGrad)"
        filter="url(#textGlow)">MIXVY</text>

  <!-- Sparkles -->
  <circle cx="88"  cy="504" r="7"   fill="#60A5FA" opacity="0.85"/>
  <circle cx="68"  cy="524" r="4"   fill="#FFFFFF"  opacity="0.70"/>
  <circle cx="96"  cy="542" r="5"   fill="#A78BFA" opacity="0.75"/>
  <circle cx="936" cy="504" r="7"   fill="#60A5FA" opacity="0.85"/>
  <circle cx="956" cy="524" r="4"   fill="#FFFFFF"  opacity="0.70"/>
  <circle cx="928" cy="542" r="5"   fill="#A78BFA" opacity="0.75"/>
</svg>
