<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0D0A23"/>
      <stop offset="100%" stop-color="#060512"/>
    </radialGradient>
    <!-- Text gradient (left white → right blue) -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#DCC8FF"/>
      <stop offset="65%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="45%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Glow filter for ring -->
    <filter id="ringGlow" x="-12%" y="-40%" width="124%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow filter for text -->
    <filter id="textGlow" x="-4%" y="-30%" width="108%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.75" result="fc"/>
      <feComposite in="fc" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Outer ambient glow -->
    <filter id="ambientGlow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient outer glow halo -->
  <ellipse cx="600" cy="250" rx="488" ry="198"
           fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.18"
           filter="url(#ambientGlow)"/>

  <!-- Main ellipse ring -->
  <ellipse cx="600" cy="250" rx="464" ry="182"
           fill="none" stroke="url(#ringGrad)" stroke-width="9"
           filter="url(#ringGlow)"/>

  <!-- Inner specular highlight -->
  <ellipse cx="600" cy="250" rx="459" ry="177"
           fill="none" stroke="rgba(220,182,255,0.28)" stroke-width="1.5"/>

  <!-- MIXVY text -->
  <text x="600" y="298"
        font-family="'Arial Black', 'Impact', 'Arial', system-ui, sans-serif"
        font-size="196" font-weight="900"
        text-anchor="middle"
        letter-spacing="14"
        fill="url(#textGrad)"
        filter="url(#textGlow)">MIXVY</text>

  <!-- Sparkles — left -->
  <circle cx="118" cy="234" r="5"   fill="#60A5FA" opacity="0.90"/>
  <circle cx="94"  cy="254" r="2.8" fill="#FFFFFF"  opacity="0.75"/>
  <circle cx="128" cy="272" r="3.5" fill="#A78BFA" opacity="0.80"/>
  <!-- Sparkles — right -->
  <circle cx="1082" cy="234" r="5"   fill="#60A5FA" opacity="0.90"/>
  <circle cx="1106" cy="254" r="2.8" fill="#FFFFFF"  opacity="0.75"/>
  <circle cx="1072" cy="272" r="3.5" fill="#A78BFA" opacity="0.80"/>
</svg>
