<!DOCTYPE html>

<head>

    content="default-src 'self' https: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob:; style-src 'self' 'unsafe-inline' https: fonts.googleapis.com; font-src 'self' https: fonts.gstatic.com; img-src 'self' https: data: blob:; connect-src 'self' https: wss: blob:; frame-src 'self' https://js.stripe.com/; media-src 'self' https: blob:; object-src 'none'; base-uri 'self';">
  <title>MIXVY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Noto Sans', 'Noto Sans Symbols 2', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      z-index: 9999;
    }

    #loading.hidden {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      pointer-events: none;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(74, 144, 226, 0.2);
      border-top-color: #4A90E2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      color: #fff;
      font-size: 18px;
      font-weight: 500;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="loader"></div>
    <div class="loading-text">Loading Vybe Social...</div>
  </div>

  <!-- Handle performance optimizations -->
  <script>
    // Force clear stale service-worker caches so production matches current code.
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) {
            reg.unregister();
          });
        }).catch(function () {});
      }

      if ('caches' in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (key) {
            caches.delete(key);
          });
        }).catch(function () {});
      }
    })();

    // Fix non-passive event listener warnings by patching addEventListener
    (function () {
      const originalAddEventListener = EventTarget.prototype.addEventListener;
      EventTarget.prototype.addEventListener = function (type, listener, options) {
        // Make wheel, touchstart, touchmove, touchend passive for better scroll performance
        if (['wheel', 'touchstart', 'touchmove', 'touchend'].includes(type)) {
          if (typeof options === 'object' && options.passive === undefined) {
            options = { ...options, passive: true };
          } else if (typeof options !== 'object') {
            options = { passive: true };
          }
        }
        return originalAddEventListener.call(this, type, listener, options);
      };
    })();

    // Fix Google Fonts SRI integrity mismatch - remove integrity from external stylesheets
    const originalFetch = window.fetch;
    window.fetch = function (...args) {
      const result = originalFetch.apply(this, args);
      return result;
    };

    // Monitor and fix link elements with integrity attributes that may fail
    const observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        if (mutation.addedNodes.length) {
          mutation.addedNodes.forEach(function (node) {
            if (node.nodeType === 1) { // Element node
              if (node.tagName === 'LINK' && node.href && node.href.includes('googleapis')) {
                // Remove integrity from Google API stylesheets - they may change
                if (node.integrity) {
                  console.log('[FIX] Removing integrity attribute from Google Fonts link');
                  node.removeAttribute('integrity');
                }
                // Add crossorigin for CORS
                node.setAttribute('crossorigin', 'anonymous');
              }
            }
          });
        }
      });
    });

    observer.observe(document.head, { childList: true, subtree: true });

    // Pre-emptively fix any existing links
    document.querySelectorAll('link[href*="googleapis"]').forEach(function (link) {
      if (link.integrity) {
        console.log('[FIX] Removing integrity attribute from existing Google Fonts link');
        link.removeAttribute('integrity');
      }
      link.setAttribute('crossorigin', 'anonymous');
    });

    // Suppress browser extension errors by safely wrapping chrome API access
    if (typeof chrome === 'undefined') {
      window.chrome = {
        runtime: { onMessage: { addListener: function () { } } },
        tabs: { onUpdated: { addListener: function () { } } },
        contextMenus: { onClicked: { addListener: function () { } } },
        downloads: { onCreated: { addListener: function () { } } }
      };
    }

    // Suppress tracking prevention warnings - Edge feature
    if (typeof navigator !== 'undefined' && navigator.doNotTrack === undefined) {
      Object.defineProperty(navigator, 'doNotTrack', {
        value: '1',
        writable: false,
        enumerable: true,
        configurable: true
      });
    }
  </script>

  <!-- Safari WebGL2 shim: WebKit's WebGL2 is unstable; returning null forces
       CanvasKit to fall back to WebGL1, which is far more stable on Safari. -->
  <script>
    (function () {
      var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      if (isSafari) {
        var _origGetContext = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function (type) {
          if (type === 'webgl2') return null;
          return _origGetContext.apply(this, arguments);
        };
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" defer></script>

  <script>
    // Hide loading screen when Flutter has actually rendered its first frame.
    // Uses a MutationObserver to detect Flutter's root element (flt-glass-pane),
    // with a 6-second hard fallback.
    (function () {
      function hideLoader() {
        const loadingDiv = document.getElementById('loading');
        if (loadingDiv) loadingDiv.classList.add('hidden');
      }

      // Observe body for Flutter's root element
      const observer = new MutationObserver(function () {
        if (document.querySelector('flt-glass-pane') ||
            document.querySelector('flutter-view')) {
          observer.disconnect();
          // Small delay so Flutter paints at least one frame
          requestAnimationFrame(function () { requestAnimationFrame(hideLoader); });
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Hard fallback: hide after 6 seconds regardless
      window.addEventListener('load', function () {
        setTimeout(function () {
          observer.disconnect();
          hideLoader();
        }, 6000);
      });
    })();
  </script>
