<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0D0D1A"/>
  <base href="$FLUTTER_BASE_HREF">
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self)" />
  <title>MixVy - Meet. Connect. Vibe.</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png"/>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Roboto, sans-serif;
      background: #0D0D1A;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        // Register Firebase messaging worker at an absolute root path.
        navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function () {
          // Ignore optional push setup failures.
        });
      }

      var baseTag = document.querySelector('base');
      var baseHref = baseTag ? baseTag.getAttribute('href') : '/';
      if (!baseHref || baseHref.indexOf('$FLUTTER_BASE_HREF') !== -1) {
        baseHref = '/';
      }
      if (!baseHref.endsWith('/')) {
        baseHref += '/';
      }

      var script = document.createElement('script');
      // Use an absolute path to avoid route-relative script requests on deep links.
      script.src = baseHref + 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
