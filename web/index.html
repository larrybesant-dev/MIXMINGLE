    <!-- Content-Security-Policy
       ─────────────────────────────────────────────────────────────────────
       Mirrors the HTTP header set in firebase.json (hosting.headers).
       Keep both in sync when changing either.
       ─────────────────────────────────────────────────────────────────────
       Directives explained:
         default-src  – fallback for anything not explicitly listed
         script-src   – Flutter bootstrap + Agora Web SDK v5 CDN
         style-src    – Flutter inline styles + Google Fonts
         font-src     – Google Fonts woff2
         img-src      – Firebase Storage, user avatars, data URIs, blobs
         media-src    – WebRTC camera/mic blobs + mediastream: from getUserMedia
         connect-src  – Firestore, Firebase Auth, Storage, Functions,
                        Agora signaling (https + wss), Agora media relay (sd-rtn.com)
         frame-src    – Firebase Auth iframe (project.firebaseapp.com/__/auth/handler),
                        Google Sign-In and reCAPTCHA iframes, Agora
         child-src    – Pop-out windows (blob:) + Firebase auth popups
         worker-src   – Flutter service worker + Agora web workers (blob:)
         object-src   – Disallow Flash / plugins
         base-uri     – Prevent base-tag injection
       ─────────────────────────────────────────────────────────────────────
  -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src 'self' blob:;
    script-src  'self' 'unsafe-inline' 'unsafe-eval' blob:
                https://download.agora.io
                https://cdn.agora.io
                https://*.agora.io
                https://www.gstatic.com
                https://apis.google.com
                https://www.googletagmanager.com;
    style-src   'self' 'unsafe-inline'
                https://fonts.googleapis.com
                https://www.gstatic.com;
    font-src    'self' data:
                https://fonts.gstatic.com;
    img-src     'self' data: blob:
                https://*.googleusercontent.com
                https://*.googleapis.com
                https://firebasestorage.googleapis.com
                https://*.firebasestorage.app
                https://lh3.googleusercontent.com;
    media-src   'self' blob: mediastream:
                https://*.agora.io
                https://*.sd-rtn.com;
    connect-src 'self' blob:
                https://*.googleapis.com
                https://*.google.com
                https://identitytoolkit.googleapis.com
                https://securetoken.googleapis.com
                https://firestore.googleapis.com
                https://firebasestorage.googleapis.com
                https://fcm.googleapis.com
                https://*.firebaseio.com
                wss://*.firebaseio.com
      connect-src 'self' blob:
            https://*.googleapis.com
            https://*.google.com
            https://identitytoolkit.googleapis.com
            https://securetoken.googleapis.com
            https://firestore.googleapis.com
            https://firebasestorage.googleapis.com
            https://fcm.googleapis.com
            https://*.firebaseio.com
            wss://*.firebaseio.com
            https://*.firebaseapp.com
            https://*.cloudfunctions.net
            https://*.agora.io
            wss://*.agora.io
            https://*.sd-rtn.com
            wss://*.sd-rtn.com
            https://statscollector.agora.io
            wss://statscollector.agora.io
            https://www.gstatic.com
            https://fonts.gstatic.com;
                https://*.firebaseapp.com
                https://accounts.google.com;
    worker-src  'self' blob:;
    object-src  'none';
    base-uri    'self';
  "
    />
    <title>Mix &amp; Mingle</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        z-index: 9999;
      }

      #loading.hidden {
        display: none;
        opacity: 0;
        transition: opacity 0.5s ease-out;
        pointer-events: none;
      }

      .loader {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(74, 144, 226, 0.2);
        border-top-color: #4a90e2;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      .loading-text {
        color: #fff;
        font-size: 18px;
        font-weight: 500;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <style id="splash-screen-style">
      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        background-color: #080c14;
        background-size: 100% 100%;
      }

      .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }

      .contain {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .stretch {
        display: block;
        width: 100%;
        height: 100%;
      }

      .cover {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .bottom {
        position: absolute;
        bottom: 0;
        left: 50%;
        -ms-transform: translate(-50%, 0);
        transform: translate(-50%, 0);
      }

      .bottomLeft {
        position: absolute;
        bottom: 0;
        left: 0;
      }

      .bottomRight {
        position: absolute;
        bottom: 0;
        right: 0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #080c14;
        }
      }
    </style>
    <script id="splash-screen-script">
      function removeSplashFromWeb() {
        document.getElementById("splash")?.remove();
        document.getElementById("splash-branding")?.remove();
        document.body.style.background = "transparent";
      }
    </script>
  </head>

  <body>
    <picture id="splash">

          splash/img/light-4x.png 4x
        "
        media="(prefers-color-scheme: light)"

      <source
        srcset="

          splash/img/dark-2x.png 2x,
          splash/img/dark-3x.png 3x,
          splash/img/dark-4x.png 4x
        "
        media="(prefers-color-scheme: dark)"
      />
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="" />

    <div id="loading">

    <!-- ========== AGORA WEB SDK v5 - PRODUCTION ==========
       This loads the production-ready Agora Web bridge with:
       - SDK v5.x (latest stable)
       - Automatic token validation
       - Permission handling
       - Comprehensive error handling

       The bridge script (agora_web_v5_production.js) loads the Agora SDK
       dynamically and provides Flutter with a clean async interface.
       ========== -->

    <!-- Load Agora Web Bridge — Production Ready
       agora_bridge.js exposes window.agoraWebBridge.* (dart:js_interop @JS target)
       AND flat-style aliases window.agoraWebInit / agoraWebJoinChannel / etc.
       AND sets window.agoraBridgeReady = true (checked by AgoraService.isBridgeReady).
  -->
    <script src="agora_bridge.js"></script>

    <!-- Production Bridge Validation - Verify bridge loaded successfully -->
    <script>
      (function () {
        const startTime = Date.now();
        // Poll at 500 ms instead of 100 ms to avoid browser performance violations.
        const checkInterval = setInterval(() => {
          const required = [
            "agoraWebInit",
            "agoraWebJoinChannel",
            "agoraWebLeaveChannel",
            "agoraWebSetMicMuted",
            "agoraWebSetVideoMuted",
            "agoraWebGetState",
          ];

          const missing = required.filter((fn) => typeof window[fn] !== "function");

          if (missing.length === 0) {
            console.log(
              "%c[AGORA] ✅ Production bridge ready with all functions",
              "color: #4CAF50; font-weight: bold;",
            );
            clearInterval(checkInterval);
          } else if (Date.now() - startTime > 15000) {
            // 15 second timeout
            console.warn(
              "%c[AGORA] ⚠️  Missing functions after 15s: " + missing.join(", "),
              "color: #FF9800; font-weight: bold;",
            );
            clearInterval(checkInterval);
          }
        }, 500); // 500 ms — relaxed poll to prevent rAF/timer performance violations
      })();
    </script>

    <!-- Handle performance optimizations -->
    <script>
      // Fix non-passive event listener warnings by patching addEventListener
      (function () {
        const originalAddEventListener = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function (type, listener, options) {
          // Make wheel, touchstart, touchmove, touchend passive for better scroll performance
          if (["wheel", "touchstart", "touchmove", "touchend"].includes(type)) {
            if (typeof options === "object" && options.passive === undefined) {
              options = { ...options, passive: true };
            } else if (typeof options !== "object") {
              options = { passive: true };
            }
          }
          return originalAddEventListener.call(this, type, listener, options);
        };
      })();

      // Fix Google Fonts SRI integrity mismatch - remove integrity from external stylesheets
      const originalFetch = window.fetch;
      window.fetch = function (...args) {
        const result = originalFetch.apply(this, args);
        return result;
      };

      // Monitor and fix link elements with integrity attributes that may fail
      const observer = new MutationObserver(function (mutations) {
        mutations.forEach(function (mutation) {
          if (mutation.addedNodes.length) {
            mutation.addedNodes.forEach(function (node) {
              if (node.nodeType === 1) {
                // Element node
                if (node.tagName === "LINK" && node.href && node.href.includes("googleapis")) {
                  // Remove integrity from Google API stylesheets - they may change
                  if (node.integrity) {
                    console.log("[FIX] Removing integrity attribute from Google Fonts link");
                    node.removeAttribute("integrity");
                  }
                  // Add crossorigin for CORS
                  node.setAttribute("crossorigin", "anonymous");
                }
              }
            });
          }
        });
      });

      observer.observe(document.head, { childList: true, subtree: true });

      // Pre-emptively fix any existing links
      document.querySelectorAll('link[href*="googleapis"]').forEach(function (link) {
        if (link.integrity) {
          console.log("[FIX] Removing integrity attribute from existing Google Fonts link");
          link.removeAttribute("integrity");
        }
        link.setAttribute("crossorigin", "anonymous");
      });

      // Suppress browser extension errors by safely wrapping chrome API access
      if (typeof chrome === "undefined") {
        window.chrome = {
          runtime: { onMessage: { addListener: function () {} } },
          tabs: { onUpdated: { addListener: function () {} } },
          contextMenus: { onClicked: { addListener: function () {} } },
          downloads: { onCreated: { addListener: function () {} } },
        };
      }

      // Suppress tracking prevention warnings - Edge feature
      if (typeof navigator !== "undefined" && navigator.doNotTrack === undefined) {
        Object.defineProperty(navigator, "doNotTrack", {
          value: "1",
          writable: false,
          enumerable: true,
          configurable: true,
        });
      }
    </script>

    <script src="flutter_bootstrap.js" defer=""></script>

    <script>
      // Hide loading screen when Flutter has actually rendered its first frame.
      // Uses a MutationObserver to detect Flutter's root element (flt-glass-pane),
      // with a 6-second hard fallback.
      (function () {
        function hideLoader() {
          const loadingDiv = document.getElementById("loading");
          if (loadingDiv) loadingDiv.classList.add("hidden");
        }

        // Observe body for Flutter's root element
        const observer = new MutationObserver(function () {
          if (document.querySelector("flt-glass-pane") || document.querySelector("flutter-view")) {
            observer.disconnect();
            // Small delay so Flutter paints at least one frame
            requestAnimationFrame(function () {
              requestAnimationFrame(hideLoader);
            });
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Hard fallback: hide after 6 seconds regardless
        window.addEventListener("load", function () {
          setTimeout(function () {
            observer.disconnect();
            hideLoader();
          }, 6000);
        });
      })();
    </script>
