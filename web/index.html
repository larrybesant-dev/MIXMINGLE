<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <base href="$FLUTTER_BASE_HREF">
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self)" />
  <title>MixVy - Welcome &amp; Login</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Roboto, sans-serif;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      // Keep push service workers intact; only clean stale Flutter workers.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            var active = registration.active && registration.active.scriptURL ? registration.active.scriptURL : '';
            var waiting = registration.waiting && registration.waiting.scriptURL ? registration.waiting.scriptURL : '';
            var installing = registration.installing && registration.installing.scriptURL ? registration.installing.scriptURL : '';
            var scriptUrl = active || waiting || installing;
            if (scriptUrl.indexOf('flutter_service_worker.js') !== -1) {
              registration.unregister();
            }
          });
        }).catch(function () {
          // Ignore service worker cleanup errors.
        });

        // Register Firebase messaging worker at an absolute root path.
        navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(function () {
          // Ignore optional push setup failures.
        });
      }

      var baseTag = document.querySelector('base');
      var baseHref = baseTag ? baseTag.getAttribute('href') : '/';
      if (!baseHref || baseHref.indexOf('$FLUTTER_BASE_HREF') !== -1) {
        baseHref = '/';
      }
      if (!baseHref.endsWith('/')) {
        baseHref += '/';
      }

      var script = document.createElement('script');
      // Use an absolute path to avoid route-relative script requests on deep links.
      script.src = baseHref + 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
