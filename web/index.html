<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <base href="$FLUTTER_BASE_HREF">
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self)" />
  <title>MixVy - Welcome &amp; Login</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Roboto, sans-serif;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var baseTag = document.querySelector('base');
      var baseHref = baseTag ? baseTag.getAttribute('href') : '/';
      if (!baseHref || baseHref.indexOf('$FLUTTER_BASE_HREF') !== -1) {
        baseHref = '/';
      }
      if (!baseHref.endsWith('/')) {
        baseHref += '/';
      }

      var script = document.createElement('script');
      script.src = baseHref + 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
