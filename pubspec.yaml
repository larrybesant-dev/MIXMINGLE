name: mix_and_mingle
description: A social video chat platform for live performances and global connections.
publish_to: "none"
version: 0.1.0+101

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  firebase_analytics: ^12.0.4
  firebase_remote_config: ^6.0.4
  firebase_crashlytics: ^5.0.5
  flutter_local_notifications: ^20.0.0
  cloud_functions: ^6.0.4

  # State Management
  flutter_riverpod: ^3.0.0

  # Video Chat
  agora_rtc_engine: ^6.2.2
  permission_handler: ^12.0.1

  # UI/UX
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0
  photo_view: ^0.15.0
  lottie: ^3.0.0

  # Utilities
  intl: ^0.20.0
  timeago: ^3.7.0
  url_launcher: ^6.2.0
  uuid: ^4.5.1
  share_plus: ^12.0.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  image_cropper: ^11.0.0
  file_picker: ^10.0.0+1
  image: ^4.0.17

  # Social Auth
  google_sign_in: ^7.0.0
  sign_in_with_apple: ^7.0.0

  # Environment variables
  flutter_dotenv: ^6.0.0

  web: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.8
  fake_cloud_firestore: ^4.0.1
  firebase_auth_mocks: ^0.15.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/app_logo.png
    - assets/images/logo.jpg
    - assets/icons/
    - assets/animations/
    - assets/data/interests.json
    - .env
