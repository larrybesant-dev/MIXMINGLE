name: mixmingle
description: A social video chat platform for live performances and global connections.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  firebase_analytics: ^12.1.2
  firebase_remote_config: ^6.1.4
  firebase_crashlytics: ^5.0.7
  firebase_performance: ^0.11.1+4
  cloud_functions: ^6.0.6
  flutter_local_notifications: ^20.1.0

  # State Management
  flutter_riverpod: ^3.2.1
  provider: ^6.1.5+1

  # Network
  http: ^1.3.0
  crypto: ^3.0.3

  # Video
  agora_rtc_engine: ^6.5.3
  permission_handler: ^12.0.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  photo_view: ^0.15.0
  lottie: ^3.0.0

  # Audio (landing music, profile music, micro-sounds)
  audioplayers: ^6.1.0

  # Utilities
  intl: ^0.20.2
  timeago: ^3.7.0
  url_launcher: ^6.2.0
  uuid: ^4.5.1
  share_plus: ^12.0.1
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  image_cropper: ^11.0.0
  file_picker: ^10.3.10
  image: ^4.0.17

  # Social Auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # Environment
  flutter_dotenv: ^6.0.0
  # Web platform interop (required by web-only implementation files)
  web: ^1.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3
  mockito: ^5.4.4
  build_runner: ^2.4.8
  fake_cloud_firestore: ^4.0.1
  firebase_auth_mocks: ^0.15.1
  analyzer: ^10.0.1
  args: ^2.5.0

dependency_overrides:
  web: ^1.1.0
  firebase_storage_platform_interface: any
  cloud_firestore_platform_interface: any
  cloud_functions_platform_interface: any
  firebase_auth_platform_interface: any
  firebase_messaging_platform_interface: any
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/app_logo.png
    - assets/images/logo.jpg
    - assets/icons/
    - assets/animations/
    - assets/audio/
    - assets/data/interests.json
    - .env

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
