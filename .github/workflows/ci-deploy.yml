name: CI and Deploy
on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: node-version: 20
      - run: npm ci
      - run: npm test

  name: CI and Deploy

  on:
    pull_request:
      branches: [ develop ]
    push:
      branches: [ main ]

  jobs:
    test:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        name: CI and Deploy

        on:
          pull_request:
            branches: [ develop ]
          push:
            branches: [ main ]

        jobs:
          test:
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@v4

              - name: Use Node.js 24
                uses: actions/setup-node@v4
                  cache: 'npm'

              - name: Restore npm cache
                uses: actions/cache@v4
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

              - name: Install dependencies
                run: npm ci

              - name: Run tests
                run: npm test
                name: CI and Deploy
                on:
                  pull_request:
                    branches: [ develop ]
                  push:
                    branches: [ main ]
                jobs:
                  test:
                    runs-on: ubuntu-latest
                    steps:
                      - uses: actions/checkout@v4
                      - name: Use Node.js 24
                        uses: actions/setup-node@v4
                        with:
                          node-version: '24'
                          cache: 'npm'
                      - name: Restore npm cache
                        uses: actions/cache@v4
                        with:
                          path: ~/.npm
                          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                      - name: Install dependencies
                        run: npm ci
                      - name: Run tests
                        run: npm test
                  check-lockfile:
                    runs-on: ubuntu-latest
                    needs: test
                    steps:
                      - uses: actions/checkout@v4
                      - name: Use Node.js 24
                        uses: actions/setup-node@v4
                        with:
                          node-version: '24'
                      - name: Install dependencies (verify lockfile)
                        run: |
                          npm ci
                          git --no-pager diff --exit-code package-lock.json || (echo "package-lock.json changed; run 'npm install' and commit the updated lockfile." && exit 1)
                  deploy:
                    needs: check-lockfile
                    if: github.ref == 'refs/heads/main'
                    runs-on: ubuntu-latest
                    steps:
                      - uses: actions/checkout@v4
                      - name: Use Node.js 24
                        uses: actions/setup-node@v4
                        with:
                          node-version: '24'
                          cache: 'npm'
                      - name: Install dependencies
                        run: npm ci
                      - name: Authenticate to GCP
                        env:
                          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
                        run: |
                          echo "$GCP_SA_KEY" > /tmp/gcp-key.json
                          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
                          gcloud config set project mix-and-mingle-v2
                      - name: Deploy Cloud Function
                        run: |
                          gcloud functions deploy generateAgoraToken \
                            --region=us-central1 \
                            --runtime=nodejs24 \
                            --entry-point=generateAgoraToken \
                            --source=. \
                            --service-account=980846719834-compute@developer.gserviceaccount.com \
                            --set-secrets="AGORA_APP_ID=projects/mix-and-mingle-v2/secrets/AGORA_APP_ID:latest,AGORA_APP_CERTIFICATE=projects/mix-and-mingle-v2/secrets/AGORA_APP_CERTIFICATE:latest" \
                            --timeout=120s
        - name: Deploy Cloud Function
