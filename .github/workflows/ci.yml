name: CI - Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Verify formatting
        run: dart format --set-exit-if-changed .
        continue-on-error: true

      - name: 🧪 Run flutter analyze
        run: flutter analyze --no-fatal-infos lib test

      - name: 🌐 Install Chrome
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable

      - name: ✅ Run tests
        run: flutter test test/unit --platform=chrome --dart-define=ENV=dev --dart-define=FLUTTER_WEB_TEST=true
        continue-on-error: true

      - name: 📊 Generate coverage (optional)
        run: |
          flutter test test/unit --platform=chrome --coverage --dart-define=ENV=dev --dart-define=FLUTTER_WEB_TEST=true
          echo "Coverage report generated"
        continue-on-error: true

      - name: 🚨 Check for build artifacts in commit
        run: |
          if git ls-files | grep -E "(^build/|^\.dart_tool/|\.apk$|\.aab$|\.dill$)"; then
            echo "❌ ERROR: Build artifacts found in repository!"
            echo "These files should be in .gitignore"
            exit 1
          fi
          echo "✅ No build artifacts detected"

      - name: 📝 Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code formatted" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tests executed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No build artifacts in repo" >> $GITHUB_STEP_SUMMARY
