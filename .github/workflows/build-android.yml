name: Build & Release APK

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: "stable"
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔧 Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: 📦 Build App Bundle
        run: flutter build appbundle --release

      - name: 📊 Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # AGP 8.x may write APKs under android/ tree rather than build/app/
      - name: 📋 Collect APK artifacts
        run: |
          mkdir -p build/app/outputs/flutter-apk
          find android/app/build/outputs/apk -name '*.apk' \
            -exec cp {} build/app/outputs/flutter-apk/ \; 2>/dev/null || true
          echo "Final APKs:"
          ls -lh build/app/outputs/flutter-apk/ || echo 'none found'

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ steps.version.outputs.version }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/apk/release/*.apk
            build/app/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
          body: |
            ## MIXMINGLE v${{ steps.version.outputs.version }}

            ### Downloads
            - **arm64-v8a**: For most modern Android devices
            - **armeabi-v7a**: For older 32-bit devices
            - **x86_64**: For emulators/Chrome OS
            - **AAB**: For Google Play Store upload

            ### Installation
            1. Download the appropriate APK for your device
            2. Enable "Install from Unknown Sources"
            3. Install and run

            Built with Flutter 3.24.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Summary
        run: |
          echo "## Build Complete 🎉" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ APK built (split per ABI)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ App Bundle built" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Artifacts uploaded" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "- ✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY
          fi
