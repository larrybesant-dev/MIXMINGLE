name: Deploy to Firebase (Hosting + Rules)

on:
  push:
    branches: [ main ]

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yaml

  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --base-href "/"

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MIX_AND_MINGLE_V2 }}"
          channelId: live
          projectId: mix-and-mingle-v2

      - name: Deploy Firestore rules & indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,firestore:indexes \
            --project mix-and-mingle-v2 --token "$FIREBASE_TOKEN" --non-interactive
