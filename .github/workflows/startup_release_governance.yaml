name: Startup Release Governance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read

jobs:
  startup-gate:
    name: Startup Gate (Governance)
    runs-on: ubuntu-latest
    env:
      STARTUP_LOG_PATH: tools/reports/startup_timeline.log
      STARTUP_HISTORY_PATH: tools/run_history.jsonl
      STARTUP_HISTORY_WINDOW: "10"
      STARTUP_SLA_PATH: STARTUP_SLA.json
      STARTUP_WEIGHTS_PATH: STARTUP_WEIGHTS.json
      STARTUP_POLICY_PATH: STARTUP_GATE_POLICY.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (for Dart SDK)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure reports directory
        run: mkdir -p tools/reports

      - name: Restore authoritative startup history cache
        id: restore_history
        uses: actions/cache/restore@v4
        with:
          path: tools/run_history.jsonl
          key: startup-history-main
          restore-keys: |
            startup-history-main-

      - name: Validate startup log input contract
        run: |
          if [ ! -f "${STARTUP_LOG_PATH}" ]; then
            echo "Missing startup log at ${STARTUP_LOG_PATH}" >&2
            echo "Provide startup timeline logs before governance evaluation." >&2
            exit 1
          fi

          if [ ! -s "${STARTUP_LOG_PATH}" ]; then
            echo "Startup log is empty: ${STARTUP_LOG_PATH}" >&2
            exit 1
          fi

          for cp in mainStart bindingReady firebaseReady bootstrapResolved firstFrameRendered; do
            if ! grep -q "startup.${cp}" "${STARTUP_LOG_PATH}"; then
              echo "Startup log missing required checkpoint startup.${cp}" >&2
              exit 1
            fi
          done

      - name: Run startup governance gate
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            dart run tools/startup_gate_validator.dart "${STARTUP_LOG_PATH}" \
              --sla "${STARTUP_SLA_PATH}" \
              --weights "${STARTUP_WEIGHTS_PATH}" \
              --policy "${STARTUP_POLICY_PATH}" \
              --history "${STARTUP_HISTORY_PATH}" \
              --history-window "${STARTUP_HISTORY_WINDOW}" \
              --no-history-write \
              --json > tools/reports/startup_gate_report.json
          else
            dart run tools/startup_gate_validator.dart "${STARTUP_LOG_PATH}" \
              --sla "${STARTUP_SLA_PATH}" \
              --weights "${STARTUP_WEIGHTS_PATH}" \
              --policy "${STARTUP_POLICY_PATH}" \
              --history "${STARTUP_HISTORY_PATH}" \
              --history-window "${STARTUP_HISTORY_WINDOW}" \
              --json > tools/reports/startup_gate_report.json
          fi

      - name: Evaluate gate decision policy
        run: |
          gate=$(jq -r '.gate' tools/reports/startup_gate_report.json)
          score=$(jq -r '.score' tools/reports/startup_gate_report.json)
          trend=$(jq -r '.trend.status' tools/reports/startup_gate_report.json)
          echo "Gate=${gate} Score=${score} Trend=${trend}"

          if [ "${gate}" = "FAIL" ]; then
            echo "Startup governance gate failed. Blocking merge/release." >&2
            exit 1
          fi

          block_on_warn=$(jq -r '.policy.blockOnWarn' tools/reports/startup_gate_report.json)
          if [ "${gate}" = "WARN" ] && [ "${block_on_warn}" = "true" ]; then
            echo "Startup governance gate returned WARN and policy blocks warnings." >&2
            exit 1
          fi

      - name: Build startup certification bundle
        if: always()
        run: |
          mkdir -p tools/reports/startup_cert_bundle
          cp tools/reports/startup_gate_report.json tools/reports/startup_cert_bundle/gate_report.json || true
          cp "${STARTUP_LOG_PATH}" tools/reports/startup_cert_bundle/startup_timeline.log || true
          cp "${STARTUP_SLA_PATH}" tools/reports/startup_cert_bundle/STARTUP_SLA.json || true
          cp "${STARTUP_WEIGHTS_PATH}" tools/reports/startup_cert_bundle/STARTUP_WEIGHTS.json || true
          cp "${STARTUP_POLICY_PATH}" tools/reports/startup_cert_bundle/STARTUP_GATE_POLICY.json || true
          if [ -f "${STARTUP_HISTORY_PATH}" ]; then
            cp "${STARTUP_HISTORY_PATH}" tools/reports/startup_cert_bundle/run_history.jsonl
          fi

      - name: Write step summary
        if: always()
        run: |
          echo "## Startup Release Governance" >> "$GITHUB_STEP_SUMMARY"
          if [ -f tools/reports/startup_gate_report.json ]; then
            echo "- Gate: $(jq -r '.gate' tools/reports/startup_gate_report.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Pipeline version: $(jq -r '.pipeline_version' tools/reports/startup_gate_report.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Score: $(jq -r '.score' tools/reports/startup_gate_report.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Trend: $(jq -r '.trend.status' tools/reports/startup_gate_report.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Failures:" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.failures[]? | "  - " + .' tools/reports/startup_gate_report.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No startup gate report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload startup gate report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-gate-report-${{ github.run_id }}
          path: tools/reports/startup_gate_report.json
          if-no-files-found: warn

      - name: Upload startup certification bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-certification-bundle-${{ github.run_id }}
          path: tools/reports/startup_cert_bundle
          if-no-files-found: warn

      - name: Save authoritative startup history cache (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: tools/run_history.jsonl
          key: startup-history-main-${{ github.run_id }}
