# Flutter Native Splash Configuration
# Run: dart run flutter_native_splash:create
# ─────────────────────────────────────────────────────────────────────────────
# Background color matches DesignColors.background = #080C14
# ─────────────────────────────────────────────────────────────────────────────

flutter_native_splash:
  # Background color (light + dark both use the same deep navy)
  color: "#080C14"
  color_dark: "#080C14"

  # Centered logo image
  image: assets/images/app_logo.png
  image_dark: assets/images/app_logo.png

  # Platform targets
  android: true
  ios: true
  web: true

  # Android layout
  android_gravity: center
  android_screen_orientation: portrait

  # iOS layout
  ios_content_mode: center

  # Web splash
  web_image_mode: center

  # Hide status bar + navigation bar during splash
  fullscreen: true

  # ── Android 12+ (SplashScreen API) ──────────────────────────────────────
  android_12:
    color: "#080C14"
    color_dark: "#080C14"
    image: assets/images/app_logo.png
    image_dark: assets/images/app_logo.png
    icon_background_color: "#080C14"
    icon_background_color_dark: "#080C14"
